<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fill { fill: #E8FF47; }
      .stroke-base { stroke: #E8FF47; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Microphone body - rounded rectangle capsule -->
  <path d="M 85 35 Q 85 25 100 25 Q 115 25 115 35 L 115 65 Q 115 75 100 75 Q 85 75 85 65 Z" class="fill"/>

  <!-- Microphone inner cutout for dimension -->
  <path d="M 92 40 Q 92 32 100 32 Q 108 32 108 40 L 108 60 Q 108 68 100 68 Q 92 68 92 60 Z" fill="#0A0A0A"/>

  <!-- Microphone stem -->
  <rect x="95" y="72" width="10" height="18" rx="3" class="fill"/>

  <!-- Connector line from mic to barbell -->
  <line x1="100" y1="90" x2="100" y2="108" stroke="#E8FF47" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Left weight plate outer -->
  <ellipse cx="55" cy="140" rx="20" ry="28" class="fill"/>

  <!-- Left weight plate middle ring -->
  <ellipse cx="55" cy="140" rx="15" ry="22" fill="#0A0A0A"/>

  <!-- Left weight plate inner -->
  <ellipse cx="55" cy="140" rx="10" ry="16" class="fill"/>

  <!-- Barbell bar -->
  <rect x="75" y="133" width="50" height="14" rx="3" class="fill"/>

  <!-- Barbell bar shine/highlight -->
  <rect x="75" y="133" width="50" height="6" rx="3" class="fill" opacity="0.35"/>

  <!-- Right weight plate outer -->
  <ellipse cx="145" cy="140" rx="20" ry="28" class="fill"/>

  <!-- Right weight plate middle ring -->
  <ellipse cx="145" cy="140" rx="15" ry="22" fill="#0A0A0A"/>

  <!-- Right weight plate inner -->
  <ellipse cx="145" cy="140" rx="10" ry="16" class="fill"/>

  <!-- Subtle accent lines for grip texture on barbell -->
  <line x1="80" y1="135" x2="80" y2="148" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="90" y1="133" x2="90" y2="150" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="133" x2="110" y2="150" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
  <line x1="120" y1="135" x2="120" y2="148" stroke="#E8FF47" stroke-width="1" opacity="0.4"/>
</svg>